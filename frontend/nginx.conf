# Nginx configuration for the React SPA frontend.
#
# In the Docker network, the backend service is reachable at http://backend:8000.
# All /api/* and /health requests from the browser are proxied to the backend,
# while all other paths serve the static Vite build with SPA fallback routing.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check proxy ─────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    # ── OpenAPI / Swagger docs proxy ───────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── SPA fallback — serve index.html for all unmatched routes ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
